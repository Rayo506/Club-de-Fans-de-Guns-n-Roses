<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/eventos.css">
    <link rel="icon" type="image/png" href="img/logo.png">
    <title>Club de Fans de Guns n' Roses</title>
</head>

<body>
    <nav class="nav-global">
        <div class="nav-izquierda">
            <img src="img/logo.png" alt="Logo Guns N' Roses" class="nav-logo">
            <h1 class="nav-titulo">Club de Fans de Guns n' Roses</h1>
        </div>
        <div class="nav-derecha">
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html">Inicio</a></li>
                <li class="nav-item"><a href="marketplace.html">Marketplace</a></li>
                <li class="nav-item"><a href="eventos.html">Evento</a></li>
                <li class="nav-item"><a href="login.html">Login</a></li>
            </ul>
        </div>
        <div style="clear: both;"></div>
    </nav>

    <main>
        <section class="cabecera-eventos">
            <div class="fila-titulo">
                <h1 class="titulo-pagina">Eventos</h1>
                <button class="btn-crear-evento" id="btn-crear-evento" type="button">Crear evento</button>
                <div style="clear: both;"></div>
            </div>

            <div class="barra-filtros">
                <div class="filtro-buscador">
                    <input type="text" placeholder="Buscar eventos..." id="buscar-evento">
                </div>

                <div class="filtro-controles">
                    <label for="filtro-fecha">Fecha:</label>
                    <input type="date" id="filtro-fecha">

                    <label for="filtro-lugar">Lugar:</label>
                    <select id="filtro-lugar">
                        <option value="todos">Todos</option>
                        <option value="madrid">Madrid</option>
                        <option value="barcelona">Barcelona</option>
                        <option value="valencia">Valencia</option>
                    </select>
                </div>
                <div style="clear: both;"></div>
            </div>
            <p id="eventos-mensaje" class="mensaje-eventos"></p>
        </section>

        <section class="listado-eventos">
            <div id="eventos-contenedor-js">
                <p>Cargando eventos aprobados...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Club de Fans de Guns n' Roses. Todos los derechos reservados.</p>
        <p>Desarrollado con pasión por el Equipo GRUPO8.</p>
    </footer>
    <script src="js/api.js"></script>
    <script src="js/eventos.js"></script>
</body>

</html>
