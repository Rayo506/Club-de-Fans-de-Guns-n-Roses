<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/marketplace.css">
    <link rel="icon" type="image/png" href="img/logo.png">
    <title>Marketplace - Club de Fans de Guns n' Roses</title>
</head>

<body>
    <nav class="nav-global">
        <div class="nav-izquierda">
            <img src="img/logo.png" alt="Logo Guns N' Roses" class="nav-logo">
            <h1 class="nav-titulo">Club de Fans de Guns n' Roses</h1>
        </div>
        <div class="nav-derecha">
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html">Inicio</a></li>
                <li class="nav-item"><a href="marketplace.html">Marketplace</a></li>
                <li class="nav-item"><a href="eventos.html">Evento</a></li>
                <li class="nav-item"><a href="login.html">Login</a></li>
            </ul>
        </div>
        <div style="clear: both;"></div>
    </nav>

    <main>
        <section class="cabecera-marketplace">
            <div class="fila-titulo">
                <h1 class="titulo-pagina">Marketplace</h1>
                <button type="button" class="btn-carrito" id="btn-ver-carrito">Carrito (<span id="carrito-contador">0</span>)</button>
                <div style="clear: both;"></div>
            </div>

            <div class="barra-filtros">
                <div class="filtro-buscador">
                    <input type="text" placeholder="Buscar productos..." id="buscar-productos">
                </div>

                <div class="filtro-controles">
                    <label for="filtro-type">Tipo de objeto:</label>
                    <select id="filtro-type">
                        <option value="todos">Todos</option>
                        <option value="ropa">Ropa</option>
                        <option value="accesorios">Accesorios</option>
                        <option value="instrumentos">Instrumentos</option>
                        <option value="musica">Vinilos / CDs</option>
                        <option value="merch">Merchandising</option>
                    </select>
                </div>
                <div style="clear: both;"></div>
            </div>
        </section>

        <section class="carrito-panel" id="carrito-panel">
            <h2>Carrito</h2>
            <div id="carrito-lista" class="carrito-lista"></div>
            <button type="button" id="btn-comprar-carrito" class="btn-comprar-carrito">Comprar</button>
            <p id="carrito-mensaje" class="mensaje-form"></p>
        </section>

        <p id="productos-mensaje" class="mensaje-eventos"></p>

        <section class="listado-productos">
            <div id="productos-contenedor-js"></div>
        </section>

        <section class="seccion-subir-producto">
            <a href="subir-producto.html" class="btn-subir-producto">Subir producto</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Club de Fans de Guns n' Roses. Todos los derechos reservados.</p>
        <p>Desarrollado con pasión por el Equipo GRUPO8.</p>
    </footer>
    <script src="js/api.js"></script>
    <script src="js/productos.js"></script>
</body>

</html>
